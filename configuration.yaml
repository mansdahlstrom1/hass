default_config:

homeassistant: !include src/homeassistant.yaml
http: !include src/http.yaml
person: !include src/persons.yaml
group: !include src/groups.yaml
automation: !include_dir_list src/automations
script: !include src/scripts.yaml
template: !include_dir_merge_list src/template

alexa: !include src/alexa.yaml
homekit: !include src/homekit.yaml
light: !include src/light_groups.yaml
wake_on_lan:

# # Xiaomi Cloud Map Extractor
# camera: !include src/dusty_map_extractor.yaml

binary_sensor:
  - platform: flic

sensor:
  - platform: time_date
    display_options:
      - "time"
      - "date"
      - "date_time"
      - "date_time_utc"
      - "date_time_iso"
      - "time_date"
      - "time_utc"

input_text: !include src/inputs/text.yaml
input_boolean: !include src/inputs/boolean.yaml
input_datetime: !include src/inputs/datetime.yaml

notify:
  - name: family
    platform: group
    services:
      - service: mobile_app_mans_iphone_14_pro
      - service: mobile_app_agnes_iphone

rest_command:
  log_watering:
    url: "http://localhost:13338/waterings"
    method: POST
    content_type: "application/json"
    payload: '{"plant_slug": "{{ slug }}", "source": "{{ source }}"}'
    timeout: 5

rest:
  - resource: http://localhost:13338/stats
    scan_interval: 300
    sensor:
      - name: Plants Watering Stats
        unique_id: plants_watering_stats
        value_template: "{{ value_json.keys() | list | length }}"
        json_attributes:
          - dill
          - persilja
          - timjan
          - graslok
          - dahlia
          - pelargon
          - lavandell
          - murgrona_1
          - murgrona_2

frontend:
  themes: !include_dir_merge_named themes
  # /config/themes/dark_themes/dark_themes.yaml

lovelace:
  dashboards:
    house-plants:
      mode: yaml
      filename: src/dashboards/plants.yaml
      title: Plants
      icon: mdi:sprout
      show_in_sidebar: true
