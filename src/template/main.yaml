- binary_sensor:
    - name: Mans Home Wifi
      unique_id: mans_home_wifi
      state: >-
        {% set ssid = states('sensor.mans_iphone_x_ssid') %}
        {% if ssid == '404 - Not Found' %}
          true
        {% elif ssid in ['unknown', 'unavailable'] %}
          {{ this.state == 'on' }}
        {% else %}
          false
        {% endif %}
      delay_off: "00:02:00"

    - name: Agnes Home Wifi
      unique_id: agnes_home_wifi
      state: >-
        {% set ssid = states('sensor.agnes_iphone_ssid_2') %}
        {% if ssid == '404 - Not Found' %}
          true
        {% elif ssid in ['unknown', 'unavailable'] %}
          {{ this.state == 'on' }}
        {% else %}
          false
        {% endif %}
      delay_off: "00:02:00"

    - name: Anyone Home
      unique_id: anyone_home
      state: >-
        {{ is_state('binary_sensor.mans_home_wifi', 'on')
           or is_state('binary_sensor.agnes_home_wifi', 'on') }}

- sensor:
    - name: "Plant Dill"
      unique_id: plant_dill
      icon: mdi:sprout
      state: >-
        {% set ts = state_attr('input_datetime.plant_dill_last_watered', 'timestamp') %}
        {% set interval = 2 %}
        {% if ts in [none, 0] %}
          overdue
        {% else %}
          {% set secs = now().timestamp() - ts %}
          {% if secs < 300 %} nyvattnad
          {% else %}
            {% set days = secs / 86400 %}
            {% if days < interval - 0.5 %} ok
            {% elif days < interval + 0.5 %} due
            {% else %} overdue
            {% endif %}
          {% endif %}
        {% endif %}
      attributes:
        display_name: "Dill"
        room: balcony
        species: "Anethum graveolens"
        interval_days: 2
        days_since: >-
          {% set ts = state_attr('input_datetime.plant_dill_last_watered', 'timestamp') %}
          {% if ts in [none, 0] %} none
          {% else %} {{ ((now().timestamp() - ts) / 86400) | round(1) }}
          {% endif %}
        last_watered: "{{ states('input_datetime.plant_dill_last_watered') }}"
        relative_last_watered: >-
          {% set ts = state_attr('input_datetime.plant_dill_last_watered', 'timestamp') %}
          {% if ts in [none, 0] %}aldrig
          {% else %}
            {% set secs = now().timestamp() - ts %}
            {% set mins = (secs / 60) | int %}
            {% set hours = (secs / 3600) | int %}
            {% set cal_days = (now().date() - (ts | as_datetime | as_local).date()).days %}
            {% if mins < 1 %}precis nu
            {% elif mins < 60 %}{{ mins }} min sedan
            {% elif cal_days == 0 %}{{ hours }} h sedan
            {% elif cal_days == 1 %}igår
            {% elif cal_days == 2 %}i förrgår
            {% elif cal_days < 7 %}{{ cal_days }} dagar sedan
            {% else %}{{ cal_days }} d sedan
            {% endif %}
          {% endif %}
        light: "Full sol / halvskugga"
        water: "Ofta — håll jämnt fuktig"
        care: |
          Älskar fukt och tål inte att torka ut.
          Små krukor i västsol torkar snabbt — vattna ofta.
          Plocka blad regelbundet för att hålla plantan i tillväxt.
          Ettårig.

