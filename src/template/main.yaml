    - name: "Plants Needing Water"
      unique_id: plants_needing_water
      icon: mdi:watering-can
      state: >-
        {% set entities = [
          'sensor.plant_dill', 'sensor.plant_persilja', 'sensor.plant_timjan',
          'sensor.plant_graslok', 'sensor.plant_dahlia', 'sensor.plant_pelargon',
          'sensor.plant_lavandell', 'sensor.plant_murgrona_1', 'sensor.plant_murgrona_2'
        ] %}
        {% set ns = namespace(count=0) %}
        {% for e in entities %}
          {% if states(e) in ['due', 'overdue'] %}
            {% set ns.count = ns.count + 1 %}
          {% endif %}
        {% endfor %}
        {{ ns.count }}
      attributes:
        due_now: >-
          {% set entities = [
            'sensor.plant_dill', 'sensor.plant_persilja', 'sensor.plant_timjan',
            'sensor.plant_graslok', 'sensor.plant_dahlia', 'sensor.plant_pelargon',
            'sensor.plant_lavandell', 'sensor.plant_murgrona_1', 'sensor.plant_murgrona_2'
          ] %}
          {% set ns = namespace(items=[]) %}
          {% for e in entities %}
            {% if states(e) in ['due', 'overdue'] %}
              {% set label = state_attr(e, 'display_name') ~ ' (' ~ states(e) ~ ')' %}
              {% set ns.items = ns.items + [label] %}
            {% endif %}
          {% endfor %}
          {{ ns.items }}
