mark_room_watered:
  alias: Markera hela rummets växter som vattnade
  icon: mdi:watering-can-outline
  fields:
    room:
      name: Room slug
      description: "balcony / living_room / studio / kitchen / bedroom"
      selector:
        text:
  sequence:
    - variables:
        timestamp: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        plants: >-
          {{ states.sensor
             | selectattr('attributes.room', 'defined')
             | selectattr('attributes.room', 'eq', room)
             | selectattr('object_id', 'match', '^plant_')
             | map(attribute='object_id')
             | list }}
    - repeat:
        for_each: "{{ plants }}"
        sequence:
          - action: input_datetime.set_datetime
            target:
              entity_id: "input_datetime.{{ repeat.item }}_last_watered"
            data:
              datetime: "{{ timestamp }}"
          - action: rest_command.log_watering
            data:
              slug: "{{ repeat.item | replace('plant_', '') }}"
              source: room_chip
            continue_on_error: true
