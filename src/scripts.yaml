wake_and_play_ambient:
  alias: Wake Sonos Play & Start Ambient
  description: Play ambient forest sounds on Sonos Play. Speaker wakes from standby automatically on play command.
  sequence:
    - action: wake_on_lan.send_magic_packet
      data:
        mac: "80:4a:f2:b1:da:9c"
    - wait_template: "{{ not is_state('media_player.play', 'unavailable') }}"
      timeout: "00:01:30"
      continue_on_timeout: false
    - action: sonos.snapshot
      data:
        entity_id:
          - media_player.kok
          - media_player.vardagsrum
        with_group: true
    - action: media_player.unjoin
      target:
        entity_id: media_player.play
    - delay: "00:00:01"
    - action: sonos.restore
      data:
        entity_id:
          - media_player.kok
          - media_player.vardagsrum
        with_group: true
    - action: media_player.select_source
      target:
        entity_id: media_player.play
      data:
        source: "Forest - Sounds of Nature"
    - action: media_player.volume_set
      target:
        entity_id: media_player.play
      data:
        volume_level: 0.05

mark_dill_watered:
  alias: Markera Dill som vattnad
  icon: mdi:watering-can
  sequence:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.plant_dill_last_watered
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - action: rest_command.log_watering
      data:
        slug: dill
        source: card_tap
      continue_on_error: true

